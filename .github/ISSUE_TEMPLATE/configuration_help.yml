name: Configuration or setup help
description: Ask for help with installation, configuration, or usage
title: "[Help]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        For general usage questions, GitHub Discussions is preferred. Use this form when the question is tied to a specific setup problem and includes concrete environment details.
  - type: textarea
    id: goal
    attributes:
      label: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: What is happening now?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - macOS:
        - ContextHUD version:
        - Installation method:
        - Relevant commands already tried:
    validations:
      required: true

