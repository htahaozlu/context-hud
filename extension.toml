id = "zed-context-pilot"
name = "Zed Context Pilot"
version = "0.1.0"
schema_version = 1
authors = ["OpenAI Codex"]
description = "Prototype slash commands for project-aware context injection in Zed."
repository = "https://github.com/htahaozlu/zed-context"

[slash_commands.hello]
description = "Inject a minimal worktree-aware greeting into the Assistant"
requires_argument = false
tooltip_text = "Say hello with project context"

[slash_commands.brief]
description = "Generate now/session/week context briefs from git and recent file activity"
requires_argument = false
tooltip_text = "Refresh the local context brief"

[slash_commands.hud]
description = "Show always-on Claude Code + Codex usage HUD (5h session, 7d week, context %)"
requires_argument = false
tooltip_text = "Open the agent HUD"

[slash_commands.doctor]
description = "Check worktree, git execution, and state writing inside the Zed runtime"
requires_argument = false
tooltip_text = "Run runtime diagnostics"
